services:
  db:
    image: postgis/postgis:16-3.4
    container_name: sodigaz_poc_db
    environment:
      POSTGRES_DB: ${DB_NAME:-sodigaz_poc}
      POSTGRES_USER: ${DB_USER:-sodigaz}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5433:5432"   # 5433 cote hote pour eviter les conflits avec un PG local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sodigaz}"]
      interval: 5s
      retries: 5

volumes:
  postgres_data:
