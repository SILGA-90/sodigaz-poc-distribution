<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accès refusé — Supervision SODIGAZ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Inter, system-ui, sans-serif;
            background: linear-gradient(140deg, #0a1628 0%, #0d2240 55%, #0e4a7a 100%);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 2rem 1rem;
        }
        .card {
            width: 100%; max-width: 420px; background: #fff;
            border-radius: 18px; overflow: hidden;
            box-shadow: 0 24px 60px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.14);
        }
        .stripe { height: 4px; background: linear-gradient(90deg, #EE7202 0%, #FAB848 100%); }
        .body { padding: 2.5rem 2rem 2rem; text-align: center; }
        .icon-wrap {
            width: 68px; height: 68px; border-radius: 18px; margin: 0 auto 1.25rem;
            background: #fff8f0; border: 1.5px solid #fcd3a0;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: #EE7202;
        }
        .code { font-size: 3rem; font-weight: 800; color: #0a1628; letter-spacing: -.04em; line-height: 1; }
        .title { font-size: 1.1rem; font-weight: 700; color: #1f2933; margin: .5rem 0 .75rem; }
        .sub { font-size: .88rem; color: #5b6770; line-height: 1.55; margin-bottom: 1.75rem; }
        .btn {
            display: inline-flex; align-items: center; gap: .4rem;
            background: linear-gradient(135deg, #EE7202, #c45800);
            color: #fff; border: none; border-radius: 10px;
            font-size: .9rem; font-weight: 700; padding: .65rem 1.5rem;
            cursor: pointer; text-decoration: none;
            box-shadow: 0 4px 14px rgba(238,114,2,.35);
        }
        .footer { color: rgba(255,255,255,.18); font-size: .7rem; margin-top: 1.75rem; letter-spacing: .08em; }
    </style>
</head>
<body>
    <div class="card">
        <div class="stripe"></div>
        <div class="body">
            <div class="icon-wrap"><i class="bi bi-shield-lock"></i></div>
            <div class="code">403</div>
            <div class="title">Formulaire expiré</div>
            <p class="sub">Votre session a expiré pendant la saisie. Rechargez la page et recommencez l'action.</p>
            <a href="javascript:history.back()" class="btn"><i class="bi bi-arrow-left"></i> Recharger la page</a>
        </div>
    </div>
    <p class="footer">SODIGAZ APC &nbsp;·&nbsp; Supervision</p>
</body>
</html>
